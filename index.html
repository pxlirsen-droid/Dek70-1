<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find My Future</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Find My Future</h1>

<div class="menu">

<button onclick="showPage('home')">
หน้าแรก
</button>

<button onclick="showPage('grade')">
คำนวณเกรด
</button>

</div>

<div id="home" class="page">

<h2>ยินดีต้อนรับ</h2>

<p>
เว็บไซต์ค้นหาตัวเองและแนะแนวการศึกษา
</p>

</div>

<div id="grade" class="page" style="display:none;">

<h2>คำนวณเกรดรายวิชา</h2>

<label>เลือกจำนวนเทอม:</label>

<select id="semesterCount">
  <option value="1">1 เทอม</option>
  <option value="2">2 เทอม</option>
  <option value="3">3 เทอม</option>
  <option value="4">4 เทอม</option>
  <option value="5">5 เทอม</option>
  <option value="6">6 เทอม</option>
</select>

<hr>
<div id="subjects"></div>

<button onclick="addSubject()">
➕ เพิ่มวิชา
</button>

<button onclick="calculateGrade()">
📊 คำนวณ
</button>

<h3 id="gpaResult"></h3>

<h3>อันดับวิชาที่เด่น</h3>

<div id="ranking"></div>

<div id="facultyResult"></div>

</div>

<script src="app.js"></script>

</body>
</html>
